<div class="card">
	<div class="card-body" data-testid="character-card">
		<h6 class="card-subtitle mb-2 text-muted" data-testid="name">
			{{ character.name }}
		</h6>

		<div class="row" data-testid="gender">
			<div class="col-sm-2" data-testid="label">Gender:</div>
			<div class="col-sm-10" data-testid="value">
				{{ character.gender }}
			</div>
		</div>

		<div class="row" data-testid="birth-year">
			<div class="col-sm-2" data-testid="label">Birth year:</div>
			<div class="col-sm-10" data-testid="value">
				{{ character.birth_year }}
			</div>
		</div>

		<div class="row" data-testid="eye-color">
			<div class="col-sm-2" data-testid="label">Eye color:</div>
			<div class="col-sm-10" data-testid="value">
				{{ character.eye_color }}
			</div>
		</div>

		<div class="row" data-testid="skin-color">
			<div class="col-sm-2" data-testid="label">Skin color:</div>
			<div class="col-sm-10" data-testid="value">
				{{ character.skin_color }}
			</div>
		</div>
	</div>
</div>
